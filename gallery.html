<!doctype html>
<html lang="hu">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Night Rush - Galéria</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="Night Rush főoldal">
        <span class="brand-mark">♞</span>
        <span class="brand-name">Night Rush</span>
      </a>

      <nav class="main-nav" aria-label="Fő navigáció">
        <a href="index.html">Főoldal</a>
        <a href="about.html">Rólunk</a>
        <a href="members.html">Tagjaink</a>
        <a href="clubset.html">Klubszett</a>
        <a class="active" href="gallery.html">Galéria</a>
      </nav>

      <a class="signup" href="https://forms.gle/75qoNbbadKq58UjFA" target="_blank" rel="noopener noreferrer">Jelentkezem!</a>
    </header>

    <main class="gallery-page">
      <section class="gallery-hero" aria-label="Galéria fejléc">
        <p class="eyebrow">Galéria</p>
        <h1>EZEK VAGYUNK MI</h1>
      </section>

      <section class="gallery-grid" aria-label="Night Rush képek">
        <button class="gallery-card wide" type="button" aria-label="Galéria kép 1" data-full="gallery-03.png" data-title="Night Rush galéria 1">
          <img src="gallery-03.png" alt="">
        </button>
        <button class="gallery-card wide" type="button" aria-label="Galéria kép 2" data-full="gallery-02.png" data-title="Night Rush galéria 2">
          <img src="gallery-02.png" alt="">
        </button>
        <button class="gallery-card wide" type="button" aria-label="Galéria kép 3" data-full="gallery-01.png" data-title="Night Rush galéria 3">
          <img src="gallery-01.png" alt="">
        </button>
      </section>

      <section class="lightbox" aria-hidden="true" aria-label="Nagyított galéria nézet">
        <button class="lightbox-close" type="button" aria-label="Bezárás">×</button>
        <button class="lightbox-nav lightbox-prev" type="button" aria-label="Előző kép">‹</button>
        <figure class="lightbox-frame">
          <img class="lightbox-image" src="" alt="">
          <figcaption class="lightbox-title"></figcaption>
        </figure>
        <button class="lightbox-nav lightbox-next" type="button" aria-label="Következő kép">›</button>
      </section>
    </main>
    <script src="gallery.js"></script>
  </body>
</html>
